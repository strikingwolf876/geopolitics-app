# FockNote — Sveltia CMS config
# Docs: https://sveltiacms.app/en/docs/
#
# This shell is wired to strikingwolf876/geopolitics — a private knowledge-base repo
# (not the FockNote default content/notes layout). Collections below match its real
# structure: knowledge/{cases,people,doctrines,ledger,sources}. Pages serves only this
# app shell (code); notes are read/written via the GitHub API with YOUR token — never
# served by Pages — so the knowledge base stays private.

backend:
  name: github
  repo: strikingwolf876/geopolitics
  branch: main

media_folder: knowledge/media
public_folder: /knowledge/media

collections:
  - name: cases
    label: Cases
    label_singular: Case
    folder: knowledge/cases
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, title]
    summary: "{{title}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: case }
      - { name: title, label: Title, widget: string }
      - { name: source_speaker, label: Source speaker, widget: string, required: false }
      - { name: source_format, label: Source format, widget: string, required: false }
      - { name: resource, label: Resource, widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: status, label: Status, widget: string, required: false }
      - { name: confidence, label: Confidence, widget: string, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: people
    label: People (track record)
    label_singular: Person
    folder: knowledge/people
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, title]
    summary: "{{title}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: person }
      - { name: title, label: Full name, widget: string }
      - { name: also_known_as, label: Also known as, widget: string, required: false }
      - { name: affiliation, label: Affiliation, widget: string, required: false }
      - { name: alignment, label: Alignment, widget: string, required: false }
      - { name: resource, label: Resource, widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: status, label: Status, widget: string, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: doctrines
    label: Doctrines
    label_singular: Doctrine
    folder: knowledge/doctrines
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, title]
    summary: "{{title}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: doctrine }
      - { name: title, label: Title, widget: string }
      - { name: author, label: Author, widget: string, required: false }
      - { name: year, label: Year, widget: string, required: false }
      - { name: resource, label: Resource, widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: status, label: Status, widget: string, required: false }
      - { name: confidence, label: Confidence, widget: string, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: ledger
    label: Known-liar ledger
    label_singular: Ledger entry
    folder: knowledge/ledger
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, actor]
    summary: "{{actor}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: liar-ledger }
      - { name: actor, label: Actor, widget: string }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: status, label: Status, widget: string, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: sources
    label: Sources (bias vectors)
    label_singular: Source
    folder: knowledge/sources
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, title]
    summary: "{{title}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: source }
      - { name: title, label: Outlet, widget: string }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: status, label: Status, widget: string, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: official-docs-agreements
    label: Official Docs — Agreements
    label_singular: Agreement
    folder: knowledge/official-docs/agreements
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, date, title]
    summary: "{{title}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: official-doc }
      - { name: title, label: Title, widget: string }
      - { name: type_detail, label: Type detail, widget: string, required: false }
      - { name: issuer, label: Issuer, widget: string, required: false }
      - { name: date, label: Date, widget: string, required: false }
      - { name: source_url, label: Source URL, widget: string, required: false }
      - { name: source_urls, label: Source URLs, widget: list, required: false }
      - { name: source_status, label: Source status, widget: string, required: false }
      - { name: primary_artifact, label: Primary artifact, widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: official-docs-investigations
    label: Official Docs — Investigations
    label_singular: Investigation
    folder: knowledge/official-docs/investigations
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    sortable_fields: [timestamp, date, title]
    summary: "{{title}}"
    fields:
      - { name: type, label: Type, widget: hidden, default: official-doc }
      - { name: title, label: Title, widget: string }
      - { name: type_detail, label: Type detail, widget: string, required: false }
      - { name: issuer, label: Issuer, widget: string, required: false }
      - { name: date, label: Date, widget: string, required: false }
      - { name: source_url, label: Source URL, widget: string, required: false }
      - { name: source_urls, label: Source URLs, widget: list, required: false }
      - { name: source_status, label: Source status, widget: string, required: false }
      - { name: primary_artifact, label: Primary artifact, widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: timestamp, label: Timestamp, widget: datetime, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: receipts
    label: Receipts
    files:
      - name: todo-receipts
        label: Todo Receipts
        file: knowledge/todo-receipts.md
        fields:
          - { name: type, label: Type, widget: hidden, default: todo }
          - { name: title, label: Title, widget: string }
          - { name: timestamp, label: Timestamp, widget: datetime, required: false }
          - { name: body, label: Body, widget: markdown }
